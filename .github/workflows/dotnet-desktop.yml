# Workflow di build e test per il microservizio UserManagement.Api
# (ASP.NET Core Web API, .NET 10 / EF Core / SQLite).
#
# Esegue restore, build e test della solution ad ogni push o pull request
# verso il branch main.

name: .NET Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    env:
      Solution_Path: UserManagement.slnx

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore ${{ env.Solution_Path }}

    - name: Build
      run: dotnet build ${{ env.Solution_Path }} --no-restore --configuration Release

    - name: Run tests
      run: dotnet test ${{ env.Solution_Path }} --no-build --configuration Release
